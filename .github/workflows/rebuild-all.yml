name: Rebuild All Packages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rebuild'
        required: false
        type: string
  schedule:
    # Full rebuild monthly on the 1st at 1 AM UTC
    - cron: '0 1 1 * *'

jobs:
  rebuild-all:
    name: Trigger all package builds
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GNOME 48 build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-gnome48.yml',
              ref: 'main'
            });

      - name: Trigger MoreWaita build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-morewaita.yml',
              ref: 'main'
            });

      - name: Trigger Tailscale build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-tailscale.yml',
              ref: 'main'
            });

      - name: Summary
        run: |
          echo "Triggered rebuild of all packages"
          echo "Reason: ${{ inputs.reason || 'Scheduled monthly rebuild' }}"
