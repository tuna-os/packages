name: Reusable Package Build

on:
  workflow_call:
    inputs:
      package-name:
        description: 'Package name (directory in packages/)'
        required: true
        type: string
      arches:
        description: 'Architectures to build (JSON array)'
        required: false
        type: string
        default: '["x86_64", "x86_64_v2", "aarch64"]'
      publish:
        description: 'Publish to GHCR'
        required: false
        type: boolean
        default: true
    secrets:
      COSIGN_PRIVATE_KEY:
        description: 'Cosign private key for signing'
        required: false

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository_owner }}/packages

jobs:
  build:
    name: Build ${{ inputs.package-name }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(inputs.arches) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            rpm \
            curl \
            git \
            jq \
            python3-yaml

          # Install yq for YAML parsing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Install ORAS CLI
          ORAS_VERSION="1.2.2"
          curl -sL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin oras
          oras version

      - name: Verify package exists
        id: verify
        run: |
          PACKAGE_YAML="packages/${{ inputs.package-name }}/package.yaml"

          if [ ! -f "${PACKAGE_YAML}" ]; then
            echo "Error: Package configuration not found: ${PACKAGE_YAML}" >&2
            exit 1
          fi

          PKG_NAME=$(yq eval '.name' "${PACKAGE_YAML}")
          PKG_VERSION=$(yq eval '.version' "${PACKAGE_YAML}")
          PKG_RELEASE=$(yq eval '.release' "${PACKAGE_YAML}")

          echo "name=${PKG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${PKG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release=${PKG_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${PKG_VERSION}-${PKG_RELEASE}-${{ matrix.arch }}-el10" >> "${GITHUB_OUTPUT}"

          echo "Package: ${PKG_NAME}"
          echo "Version: ${PKG_VERSION}-${PKG_RELEASE}"
          echo "Architecture: ${{ matrix.arch }}"

      - name: Fetch/build RPM
        id: build
        run: |
          chmod +x scripts/rebuild-package.sh

          OUTPUT_DIR="./build-output-${{ matrix.arch }}"
          export OUTPUT_DIR

          BUILT_RPM=$(./scripts/rebuild-package.sh "${{ inputs.package-name }}" "${{ matrix.arch }}")

          if [ -z "${BUILT_RPM}" ] || [ ! -f "${BUILT_RPM}" ]; then
            echo "Error: No RPM produced" >&2
            exit 1
          fi

          RPM_BASENAME="$(basename "${BUILT_RPM}")"
          cp "${BUILT_RPM}" "./${RPM_BASENAME}"

          echo "rpm_path=${BUILT_RPM}" >> "${GITHUB_OUTPUT}"
          echo "rpm_name=${RPM_BASENAME}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR with ORAS
        if: ${{ inputs.publish }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x scripts/oras-push.sh
          export REGISTRY="${{ env.REGISTRY }}"
          export REPOSITORY="${{ env.REPOSITORY }}"
          ./scripts/oras-push.sh "${{ steps.build.outputs.rpm_name }}"

      - name: Install Cosign
        if: ${{ inputs.publish }}
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact with Cosign
        if: ${{ inputs.publish }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "No cosign key configured, skipping"
            exit 0
          fi
          FULL_REF="${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ steps.verify.outputs.name }}:${{ steps.verify.outputs.tag }}"
          echo "${COSIGN_PRIVATE_KEY}" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${FULL_REF}"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.verify.outputs.name }}-${{ steps.verify.outputs.tag }}
          path: ${{ steps.build.outputs.rpm_name }}
          if-no-files-found: error
          retention-days: 30
